<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Total Sales Report - Sagar Super</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .report-container {
            padding: 20px;
        }

        .filter-panel {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 25px;
            background: var(--glass-bg);
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }

        .category-block {
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            overflow: hidden;
        }

        .category-header {
            background: rgba(99, 102, 241, 0.1);
            padding: 12px 20px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        .report-table {
            width: 100%;
            border-collapse: collapse;
        }

        .report-table th {
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            text-align: left;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .report-table td {
            padding: 10px 20px;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .qty-badge {
            background: var(--primary);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .print-only-header {
            display: none;
        }
    </style>
</head>
<body>
    {% include 'admin/sidebar.html' %}

    <main class="main-content">
        <header class="section-header">
            <div>
                <h1>Total Sales Report</h1>
                <p style="color: var(--text-muted);">Product sales quantities grouped by category headings.</p>
            </div>
            <button class="btn btn-primary btn-print" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Print Report
            </button>
        </header>

        <div class="report-container">
            <div class="filter-panel">
                <div class="form-group">
                    <label style="font-size: 0.7rem; color: var(--text-muted);">START DATE</label>
                    <input type="date" id="startDate" class="input-dark">
                </div>
                <div class="form-group">
                    <label style="font-size: 0.7rem; color: var(--text-muted);">END DATE</label>
                    <input type="date" id="endDate" class="input-dark">
                </div>
                <button class="btn btn-primary" onclick="loadReport()">
                    <i class="fa-solid fa-sync"></i> REFRESH
                </button>
            </div>

            <div class="print-only-header">
                <h1>SAGAR SUPER</h1>
                <p>Total Sales Report (Product-wise Qty)</p>
                <p id="printDateRange"></p>
            </div>

            <div id="reportContent">
                <!-- Grouped data injected here -->
            </div>
        </div>

        <footer class="dynamic-footer" style="margin-top: 40px; padding: 20px 0; border-top: 1px solid rgba(255, 255, 255, 0.08); text-align: center; color: #94a3b8; font-size: 0.85rem; font-family: 'Inter', sans-serif; letter-spacing: 0.05em; width: 100%;">
            <p>© 2025 Sagar Nilgiri Products | Sagar Super Maple Pro</p>
        </footer>
    </main>

    <script>
        const now = new Date();
        const today = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        document.getElementById('startDate').value = today;
        document.getElementById('endDate').value = today;

        async function loadReport() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;

            const startF = new Date(start).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
            const endF = new Date(end).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
            document.getElementById('printDateRange').innerText = `Period: ${startF} to ${endF}`;

            try {
                const res = await fetch('/api/reports/sales-detailed');
                const data = await res.json();

                const filtered = data.filter(r => {
                    const rDate = new Date(r.bill_date);
                    const dStr = rDate.getFullYear() + '-' + String(rDate.getMonth() + 1).padStart(2, '0') + '-' + String(rDate.getDate()).padStart(2, '0');
                    return dStr >= start && dStr <= end && r.bill_status !== 'Cancelled';
                });

                // Group by category, then by product
                const grouped = {};
                filtered.forEach(item => {
                    const cat = item.category || 'UNCATEGORIZED';
                    if (!grouped[cat]) grouped[cat] = {};

                    if (!grouped[cat][item.product_name]) {
                        grouped[cat][item.product_name] = { qty: 0, revenue: 0 };
                    }
                    grouped[cat][item.product_name].qty += item.qty;
                    grouped[cat][item.product_name].revenue += item.amount;
                });

                const container = document.getElementById('reportContent');
                container.innerHTML = '';

                const catOrder = ['OILS', 'SPICES', 'TEA/COFFEE', 'AROMATICS', 'OTHERS', 'CANDIES', 'C-MRD', 'CFC', 'FRUIT JELLY', 'VARKEY'];
                const catDisplay = {
                    'OILS': 'OILS',
                    'SPICES': 'SPICES',
                    'TEA/COFFEE': 'TEA/COFFEE',
                    'AROMATICS': 'AROMATICS',
                    'OTHERS': 'OTHERS',
                    'CANDIES': 'CANDIES',
                    'C-MRD': 'C-MRD',
                    'CFC': 'CFC',
                    'FRUIT JELLY': 'FRUIT JELLY',
                    'VARKEY': 'VARKEY'
                };

                Object.keys(grouped).filter(cat => catOrder.includes(cat)).sort((a, b) => {
                    return catOrder.indexOf(a) - catOrder.indexOf(b);
                }).forEach(cat => {
                    const products = grouped[cat];
                    let catQty = 0;
                    let catRevenue = 0;

                    const block = document.createElement('div');
                    block.className = 'category-block';

                    let rows = '';
                    Object.keys(products).sort().forEach(pName => {
                        const p = products[pName];
                        catQty += p.qty;
                        catRevenue += p.revenue;
                        rows += `
                            <tr>
                                <td>${pName}</td>
                                <td style="text-align: right;"><span class="qty-badge">${p.qty}</span></td>
                                <td style="text-align: right; font-weight: 700;">₹${p.revenue.toFixed(2)}</td>
                            </tr>
                        `;
                    });

                    block.innerHTML = `
                        <div class="category-header">
                            <span>${catDisplay[cat] || cat}</span>
                            <span>Total Items: ${catQty}</span>
                        </div>
                        <table class="report-table">
                            <thead>
                                <tr>
                                    <th>PRODUCT NAME</th>
                                    <th style="text-align: right;">QUANTITY SOLD</th>
                                    <th style="text-align: right;">TOTAL REVENUE</th>
                                </tr>
                            </thead>
                            <tbody id="rows_${cat.replace(/[^a-zA-Z0-9]/g, '')}">
                                ${rows}
                                <tr class="total-row">
                                    <td>TOTAL FOR ${catDisplay[cat] || cat}</td>
                                    <td style="text-align: right;">${catQty}</td>
                                    <td style="text-align: right;">₹${catRevenue.toFixed(2)}</td>
                                </tr>
                            </tbody>
                        </table>
                    `;
                    container.appendChild(block);
                });

                if (filtered.length === 0) {
                    container.innerHTML = '<div class="glass-panel" style="text-align: center; padding: 40px; color: var(--text-muted);">No sales data for selected period.</div>';
                }

            } catch (err) {
                console.error(err);
            }
        }

        loadReport();
    </script>
    <script>window.addEventListener('beforeprint',function(){var d=document.getElementById('printDateRange');if(d){var n=new Date();d.textContent=d.textContent.trim()+'    '+n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true})}})();</script>
</body>
</html>
