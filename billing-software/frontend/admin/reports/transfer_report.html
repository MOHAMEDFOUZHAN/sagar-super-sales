<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Report - Sagar Super</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/all.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .report-container { padding: 20px; }

        .filter-panel {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 25px;
            background: var(--glass-bg);
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }

        .report-table { width: 100%; border-collapse: collapse; }

        .report-table th {
            background: rgba(99, 102, 241, 0.1);
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--primary);
            text-transform: uppercase;
            font-size: 0.75rem;
            color: var(--text-main);
        }

        .report-table td {
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-muted);
        }

        .qty-cell { text-align: center; font-weight: 700; }
        .qty-in  { color: #10b981; font-weight: 800; }
        .qty-out { color: #ef4444; font-weight: 800; }

        .type-badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 800;
            letter-spacing: 0.03em;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .type-badge.in  { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .type-badge.out { background: rgba(239,68,68,0.15);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

        .location-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }

        .print-only-header { display: none; }

        @media print {
            .col-loc { display: table-cell !important; }
            .dynamic-footer { display: none !important; }
        }
    </style>
</head>

<body>
    {% include 'admin/sidebar.html' %}

    <main class="main-content">
        <header class="section-header">
            <div>
                <h1>Transfer Report</h1>
                <p style="color: var(--text-muted);">Stock movements between locations (Godown ↔ Shop).</p>
            </div>
            <button class="btn btn-primary btn-print" onclick="window.print()">
                <i class="fa-solid fa-print"></i> Print Report
            </button>
        </header>

        <div class="report-container">
            <div class="filter-panel">
                <div class="form-group">
                    <label style="font-size: 0.7rem; color: var(--text-muted);">FROM DATE</label>
                    <input type="date" id="startDate" class="input-dark">
                </div>
                <div class="form-group">
                    <label style="font-size: 0.7rem; color: var(--text-muted);">TO DATE</label>
                    <input type="date" id="endDate" class="input-dark">
                </div>
                <button class="btn btn-primary" onclick="loadReport()">
                    <i class="fa-solid fa-sync"></i> REFRESH
                </button>
            </div>

            <div class="print-only-header">
                <h1 style="margin: 0; font-size: 2.2rem; font-weight: 900; letter-spacing: -1px;">SAGAR SUPER</h1>
                <p style="margin: 2px 0; font-size: 1.1rem; font-weight: 600;">Stock Transfer Report</p>
                <p id="printDateRange" style="margin: 2px 0; font-weight: bold;"></p>
                <div style="border-bottom: 3px solid black; margin-top: 5px; margin-bottom: 15px;"></div>
            </div>

            <div class="glass-panel" style="padding: 20px;">
                <div class="table-wrapper">
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th>DATE/TIME</th>
                                <th>REFERENCE / CHALLAN</th>
                                <th>TYPE</th>
                                <th style="text-align: center;">CODE</th>
                                <th>ITEM NAME</th>
                                <th style="text-align: center; width: 80px;">QTY</th>
                                <th class="col-loc">FROM</th>
                                <th class="col-loc">TO</th>
                                <th style="text-align: center; width: 220px;">PRINT ACTION</th>
                            </tr>
                        </thead>
                        <tbody id="reportContent"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <footer class="dynamic-footer" style="margin-top: 40px; padding: 20px 0; border-top: 1px solid rgba(255,255,255,0.08); text-align: center; color: #94a3b8; font-size: 0.85rem;">
            <p>© 2025 Sagar Nilgiri Products | Sagar Super Maple Pro</p>
        </footer>
    </main>

    <script>
        const now = new Date();
        const today = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
        document.getElementById('startDate').value = today;
        document.getElementById('endDate').value   = today;

        async function loadReport() {
            const start = document.getElementById('startDate').value;
            const end   = document.getElementById('endDate').value;

            const startF = new Date(start).toLocaleDateString('en-GB', { day:'numeric', month:'short' });
            const endF   = new Date(end).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
            document.getElementById('printDateRange').innerText = `Period: ${startF} to ${endF}`;

            const tbody = document.getElementById('reportContent');
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--text-muted);"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</td></tr>';

            try {
                const res  = await fetch(`/api/stock/transfers?start=${start}&end=${end}`);
                const data = await res.json();

                tbody.innerHTML = '';

                // Group by reference/challan
                const groups = {};
                data.forEach(t => {
                    const refMatch = t.pushed_by ? t.pushed_by.match(/\(Ref:\s*([^)]+)\)/) : null;
                    const ref = refMatch ? refMatch[1] : 'GEN-TRF';
                    // Grouping key: reference + date + from + to
                    const groupKey = ref + '-' + t.transfer_date + '-' + t.from_location + '-' + t.to_location;
                    if (!groups[groupKey]) {
                        groups[groupKey] = {
                            reference: ref,
                            date: t.transfer_date,
                            from: t.from_location,
                            to: t.to_location,
                            type: t.transfer_type || 'OUT',
                            items: []
                        };
                    }
                    groups[groupKey].items.push(t);
                });

                const sortedGroups = Object.values(groups).sort((a, b) => new Date(b.date) - new Date(a.date));

                sortedGroups.forEach(g => {
                    const tDate    = new Date(g.date);
                    const dateTime = tDate.toLocaleDateString('en-GB') + ' ' +
                                     tDate.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true });
                    const isIN      = g.type.toUpperCase() === 'IN';
                    const typeLabel = isIN
                        ? '<span class="type-badge in"><i class="fa-solid fa-arrow-down"></i> IN</span>'
                        : '<span class="type-badge out"><i class="fa-solid fa-arrow-up"></i> OUT</span>';

                    const codesHtml = `<ul style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px;">` +
                        g.items.map(item => `
                            <li style="font-size: 0.85rem; color: var(--text-muted); font-family: monospace; text-align: center; min-height: 20px; display: flex; align-items: center; justify-content: center;">
                                ${item.product_barcode || '-'}
                            </li>
                        `).join('') + `</ul>`;

                    const itemsHtml = `<ul style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px;">` +
                        g.items.map(item => `
                            <li style="font-size: 0.85rem; color: var(--text-main); text-align: left; min-height: 20px; display: flex; align-items: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 320px;" title="${item.product_name}">
                                <strong>${item.product_name}</strong> 
                            </li>
                        `).join('') + `</ul>`;

                    const qtysHtml = `<ul style="list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 6px;">` +
                        g.items.map(item => `
                            <li style="font-size: 0.85rem; color: var(--accent); text-align: center; font-weight: 700; min-height: 20px; display: flex; align-items: center; justify-content: center;">
                                ${Math.round(item.qty)}
                            </li>
                        `).join('') + `</ul>`;

                    const tr = document.createElement('tr');
                    
                    const actionHtml = `
                        <div style="display: flex; gap: 8px; justify-content: center;">
                            <button class="btn btn-sm" onclick="printGroupTransfer('${encodeURIComponent(JSON.stringify(g))}', 'A4')" style="padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--primary); background: rgba(99, 102, 241, 0.1); color: var(--text-main); font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.75rem;" onmouseover="this.style.background='var(--primary)'" onmouseout="this.style.background='rgba(99, 102, 241, 0.1)'">
                                <i class="fa-solid fa-file-invoice"></i> A4
                            </button>
                            <button class="btn btn-sm" onclick="printGroupTransfer('${encodeURIComponent(JSON.stringify(g))}', 'BILL')" style="padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--accent); background: rgba(6, 182, 212, 0.1); color: var(--text-main); font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 0.75rem;" onmouseover="this.style.background='var(--accent)'" onmouseout="this.style.background='rgba(6, 182, 212, 0.1)'">
                                <i class="fa-solid fa-receipt"></i> BILL
                            </button>
                        </div>
                    `;

                    tr.innerHTML = `
                        <td>${dateTime}</td>
                        <td style="font-weight: bold; color: var(--accent); font-family: monospace; font-size: 1.05rem;">${g.reference}</td>
                        <td>${typeLabel}</td>
                        <td style="padding: 10px 15px; text-align: center;">${codesHtml}</td>
                        <td style="padding: 10px 15px;">${itemsHtml}</td>
                        <td style="padding: 10px 15px; text-align: center;">${qtysHtml}</td>
                        <td class="col-loc"><span class="location-badge">${g.from}</span></td>
                        <td class="col-loc"><span class="location-badge" style="color:var(--primary);">${g.to}</span></td>
                        <td>${actionHtml}</td>
                    `;

                    tbody.appendChild(tr);
                });

                if (sortedGroups.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:40px;color:var(--text-muted);">No stock transfers recorded for this date.</td></tr>';
                }

            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:30px;color:#ef4444;">Failed to load report. Please try again.</td></tr>';
                console.error(err);
            }
        }

        function printGroupTransfer(gEscaped, format) {
            const g = JSON.parse(decodeURIComponent(gEscaped));
            const tDate = new Date(g.date);
            const dateTime = tDate.toLocaleDateString('en-GB') + ' ' +
                             tDate.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', hour12:true });
            let htmlContent = '';
            
            if (format === 'A4') {
                htmlContent = `
<!DOCTYPE html>
<html>
<head>
    <title>Stock Transfer Challan - ${g.reference}</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; color: #333; }
        .header { display: flex; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 20px; }
        .title { font-size: 24px; font-weight: 800; text-transform: uppercase; }
        .details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 30px 0; }
        .details-col p { margin: 5px 0; font-size: 14px; }
        .table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .table th, .table td { padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 13px; }
        .table th { background: #f5f5f5; font-weight: bold; }
        .footer { margin-top: 60px; display: flex; justify-content: space-between; font-size: 14px; }
        .sig-box { width: 200px; border-top: 1px solid #333; text-align: center; padding-top: 8px; margin-top: 40px; }
        @media print {
            body { padding: 0; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1 style="margin: 0; font-size: 28px; font-weight: 900; letter-spacing: -1px;">SAGAR NILGIRI PRODUCTS</h1>
            <p style="margin: 5px 0; color: #666; font-size: 12px;">Stock Transfer Challan</p>
        </div>
        <div style="text-align: right;">
            <div class="title">Transfer Challan</div>
            <p style="margin: 5px 0; font-weight: bold; font-size: 16px;">Challan No: ${g.reference}</p>
        </div>
    </div>
    
    <div class="details-grid">
        <div class="details-col">
            <p><strong>From Location:</strong> ${g.from.toUpperCase()}</p>
            <p><strong>To Location:</strong> ${g.to.toUpperCase()}</p>
        </div>
        <div class="details-col" style="text-align: right;">
            <p><strong>Date:</strong> ${new Date(g.date).toLocaleDateString('en-GB')}</p>
            <p><strong>Time:</strong> ${new Date(g.date).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true })}</p>
            <p><strong>Transfer Type:</strong> ${g.type.toUpperCase()}</p>
        </div>
    </div>
    
    <table class="table">
        <thead>
            <tr>
                <th style="width: 50px;">S.No</th>
                <th>Date/Time</th>
                <th>Reference</th>
                <th>Type</th>
                <th>Code</th>
                <th>Item Name</th>
                <th style="text-align: right; width: 60px;">Qty</th>
                <th>From</th>
                <th>To</th>
            </tr>
        </thead>
        <tbody>
            ${g.items.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${dateTime}</td>
                    <td style="font-weight: bold; font-family: monospace;">${g.reference}</td>
                    <td>${g.type.toUpperCase()}</td>
                    <td style="font-family: monospace;">${item.product_barcode || '-'}</td>
                    <td style="font-weight: bold;">${item.product_name}</td>
                    <td style="text-align: right; font-weight: bold;">${parseFloat(item.qty).toLocaleString()}</td>
                    <td>${g.from.toUpperCase()}</td>
                    <td>${g.to.toUpperCase()}</td>
                </tr>
            `).join('')}
        </tbody>
    </table>
    
    <div class="footer">
        <div class="sig-box">Prepared By</div>
        <div class="sig-box">Received By</div>
        <div class="sig-box">Authorized Signatory</div>
    </div>
</body>
</html>
                `;
            } else if (format === 'BILL') {
                const displayBillNo = g.reference.replace('TRF-', '').padStart(4, '0');
                htmlContent = `
<!DOCTYPE html>
<html>
<head>
    <title>Stock Transfer Receipt - ${g.reference}</title>
    <style>
        @page { size: 80mm auto; margin: 0; }
        body {
            font-family: 'Courier New', Courier, monospace;
            width: 72mm;
            margin: 0 auto;
            padding: 5mm 2mm;
            color: #000;
            font-size: 11px;
            line-height: 1.4;
        }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .bold { font-weight: bold; }
        .brand { font-size: 14px; font-weight: bold; margin-bottom: 2px; }
        .separator { border-top: 1px dashed #000; margin: 5px 0; }
        .meta-table, .item-table { width: 100%; border-collapse: collapse; }
        .item-table th, .item-table td { padding: 4px 0; text-align: left; font-size: 10px; }
        .item-table th { font-weight: bold; }
        @media print {
            body { width: 100%; margin: 0; padding: 2mm; }
        }
    </style>
</head>
<body>
    <div class="text-center">
        <div class="brand">SAGAR</div>
        <div class="brand">NILGIRI PRODUCTS</div>
        <div class="separator"></div>
        <table class="meta-table">
            <tr>
                <td class="bold">From: ${g.from.toUpperCase()}</td>
                <td class="bold text-right">To: ${g.to.toUpperCase()}</td>
            </tr>
        </table>
        <div class="separator"></div>
        <div style="text-align: left; font-size: 10px;">
            Date : \${new Date(g.date).toLocaleDateString('en-GB')} 
            Time : \${new Date(g.date).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true })}<br>
            BILL No : \${displayBillNo}
        </div>
        <div class="separator"></div>
    </div>
    
    <table class="item-table">
        <thead>
            <tr>
                <th style="width: 25%;">Barcode</th>
                <th style="width: 55%;">PRODUCT</th>
                <th class="text-right" style="width: 20%;">QTY</th>
            </tr>
        </thead>
        <tbody>
            \${g.items.map(item => \`
                <tr>
                    <td style="vertical-align: top;">\${item.product_barcode || '-'}</td>
                    <td style="vertical-align: top; font-weight: bold; word-break: break-all;">
                        \${item.product_name}
                    </td>
                    <td class="text-right bold" style="vertical-align: top;">
                        \${parseFloat(item.qty).toLocaleString()}
                    </td>
                </tr>
            \`).join('')}
        </tbody>
    </table>
    <div class="separator"></div>
    <div style="height: 30px;"></div>
</body>
</html>
                `;
            }
            
            const iframe = document.createElement('iframe');
            iframe.style.position = 'fixed';
            iframe.style.right = '0';
            iframe.style.bottom = '0';
            iframe.style.width = '0';
            iframe.style.height = '0';
            iframe.style.border = '0';
            document.body.appendChild(iframe);
            
            const doc = iframe.contentWindow.document;
            doc.open();
            doc.write(htmlContent);
            doc.close();
            
            setTimeout(() => {
                iframe.contentWindow.focus();
                iframe.contentWindow.print();
                setTimeout(() => {
                    document.body.removeChild(iframe);
                }, 1000);
            }, 500);
        }

        loadReport();
    </script>
</body>
</html>
