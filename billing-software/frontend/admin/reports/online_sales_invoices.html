<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Sales Invoices - MaplePro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .report-container {
            padding: 20px;
        }

        .sub-nav {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
        }

        .sub-nav-link {
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 600;
            padding: 8px 16px;
            border-radius: var(--radius-md);
            transition: all 0.3s;
        }

        .sub-nav-link.active {
            background: var(--primary);
            color: white;
        }

        .sub-nav-link:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .filter-panel {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            margin-bottom: 25px;
            background: var(--glass-bg);
            padding: 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
        }

        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .invoice-table th {
            background: rgba(99, 102, 241, 0.1);
            padding: 12px 15px;
            text-align: left;
            border-bottom: 2px solid var(--glass-border);
            text-transform: uppercase;
            color: var(--text-main);
        }

        .invoice-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-muted);
        }

        .invoice-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .btn-print-sm {
            background: var(--primary);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
        }

        .btn-print-sm:hover {
            background: #4f46e5;
            transform: scale(1.05);
        }

        .doc-id {
            color: var(--primary);
            font-weight: 700;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .status-paid { background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .status-cancelled { background: rgba(239, 68, 68, 0.1); color: #ef4444; }

        @media print {
            .sub-nav, .filter-panel, .no-print {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    {% include 'admin/sidebar.html' %}

    <main class="main-content">
        <header class="section-header">
            <div>
                <h1>Online Sales Invoices</h1>
                <p style="color: var(--text-muted);">Manage and print invoices for online orders.</p>
            </div>
        </header>

        <div class="report-container">
            <nav class="sub-nav">
                <a href="{{ url_for('admin_reports_online_sales_reports') }}" class="sub-nav-link">Reports</a>
                <a href="{{ url_for('admin_reports_online_sales_invoices') }}" class="sub-nav-link active">Invoices</a>
            </nav>

            <div class="filter-panel">
                <div class="form-group">
                    <label style="font-size: 0.7rem; color: var(--text-muted);">FROM DATE</label>
                    <input type="date" id="startDate" class="input-dark">
                </div>
                <div class="form-group">
                    <label style="font-size: 0.7rem; color: var(--text-muted);">TO DATE</label>
                    <input type="date" id="endDate" class="input-dark">
                </div>
                <button class="btn btn-primary" onclick="loadInvoices()">
                    <i class="fa-solid fa-sync"></i> REFRESH
                </button>
            </div>

            <div class="glass-panel" style="padding: 20px;">
                <div class="table-wrapper">
                    <table class="invoice-table">
                        <thead>
                            <tr>
                                <th>Invoice No</th>
                                <th>Date & Time</th>
                                <th>Customer/Role</th>
                                <th>Payment Mode</th>
                                <th>Total Amount</th>
                                <th>Status</th>
                                <th style="text-align: center;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="invoiceContent">
                            <!-- Data injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    
<style>
    @media print {
        .dynamic-footer {
            display: none !important;
        }
    }
</style>
<footer class="dynamic-footer" style="margin-top: 40px; padding: 20px 0; border-top: 1px solid rgba(255, 255, 255, 0.08); text-align: center; color: #94a3b8; font-size: 0.85rem; font-family: 'Inter', sans-serif; letter-spacing: 0.05em; width: 100%;">
    <p>© 2025 Sagar Nilgiri Products | Maple Pro</p>
</footer>
</main>

    <script>
        const now = new Date();
        const today = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        document.getElementById('startDate').value = today;
        document.getElementById('endDate').value = today;

        async function loadInvoices() {
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;

            const tbody = document.getElementById('invoiceContent');
            tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-muted);">Loading orders...</td></tr>';

            try {
                // Fetch online orders from the cloud database
                let url = `/api/reports/online-sales-cloud`;
                const res = await fetch(url);
                const data = await res.json();

                if (data.status === 'error') {
                    tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--danger);"><i class="fa-solid fa-triangle-exclamation"></i> ${data.message}</td></tr>`;
                    return;
                }

                const filtered = data;

                tbody.innerHTML = '';
                
                if (filtered.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-muted);">No online orders found for this date.</td></tr>';
                    return;
                }

                filtered.forEach(bill => {
                    const bDate = new Date(bill.bill_date);
                    const dateTimeStr = bDate.toLocaleString();
                    const statusClass = bill.status === 'Cancelled' ? 'status-cancelled' : 'status-paid';
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="doc-id">${bill.invoice_no || String(bill.id).padStart(5, '0')}</td>
                        <td>${dateTimeStr}</td>
                        <td>${bill.created_by || 'Customer'}</td>
                        <td style="font-weight: 600; color: var(--accent);">${bill.payment_mode.toUpperCase()}</td>
                        <td style="font-weight: 700; color: white;">₹${parseFloat(bill.total_amount).toFixed(2)}</td>
                        <td><span class="status-badge ${statusClass}">${bill.status.toUpperCase()}</span></td>
                        <td style="text-align: center;">
                            <button class="btn-print-sm" onclick="printInvoice(${bill.id})">
                                <i class="fa-solid fa-print"></i> PRINT
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error(err);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--danger);">Error loading data.</td></tr>';
            }
        }

        function printInvoice(billId) {
            // Open the invoice view in a new window/tab
            window.open(`/admin/invoice/${billId}`, '_blank', 'width=800,height=900');
        }

        loadInvoices();
    </script>
</body>

</html>
