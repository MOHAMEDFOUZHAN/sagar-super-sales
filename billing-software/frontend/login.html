<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sagar Super Login | Premium Access</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* =========================================
           ADVANCED Sagar Super THEME - GLASS & NEON
           ========================================= */

        :root {
            --bg-dark: #0f172a;
            --bg-darker: #020617;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --secondary: #ec4899;
            --accent: #06b6d4;

            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);

            --text-main: #f1f5f9;
            --text-muted: #94a3b8;

            --radius-lg: 24px;
            --radius-md: 12px;
            --radius-sm: 8px;

            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-darker);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* --- ADVANCED ANIMATED BACKGROUND --- */
        .bg-blobs {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            filter: blur(80px);
        }

        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            opacity: 0.4;
            animation: float 20s infinite alternate;
        }

        .blob-1 {
            background: var(--primary);
            top: -100px;
            left: -100px;
            animation-duration: 15s;
        }

        .blob-2 {
            background: var(--secondary);
            bottom: -150px;
            right: -100px;
            animation-duration: 18s;
            animation-delay: -2s;
        }

        .blob-3 {
            background: var(--accent);
            top: 40%;
            left: 50%;
            width: 300px;
            height: 300px;
            animation-duration: 12s;
            animation-delay: -5s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(50px, 80px) scale(1.1);
            }

            66% {
                transform: translate(-30px, 40px) scale(0.9);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* --- LOGIN CONTAINER --- */
        .login-container {
            position: relative;
            z-index: 10;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, var(--bg-darker) 100%);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 50px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            animation: slideUpFade 0.8s var(--ease-out) forwards;
        }

        /* Shine Effect */
        .login-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            transform: rotate(45deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) rotate(45deg);
            }

            20%,
            100% {
                transform: translateX(100%) rotate(45deg);
            }
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- FORMS & TYPOGRAPHY --- */
        .login-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-header h2 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 24px;
            opacity: 0;
            animation: staggerIn 0.5s var(--ease-out) forwards;
        }

        .form-group:nth-child(1) {
            animation-delay: 0.2s;
        }

        .form-group:nth-child(2) {
            animation-delay: 0.3s;
        }

        .footer-row {
            animation: staggerIn 0.5s var(--ease-out) 0.4s forwards;
            opacity: 0;
        }

        .btn-row {
            animation: staggerIn 0.5s var(--ease-out) 0.5s forwards;
            opacity: 0;
        }

        @keyframes staggerIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            transition: all 0.3s;
            font-size: 1.1rem;
        }

        .form-control {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px 16px 14px 48px;
            border-radius: var(--radius-md);
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .form-control:focus+i {
            color: var(--primary);
            transform: translateY(-50%) scale(1.1);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
        }

        .checkbox-wrapper:hover {
            color: white;
        }

        .checkbox-wrapper input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }

        .forgot-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .forgot-link:hover {
            color: #818cf8;
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #4338ca);
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.6);
            letter-spacing: 0.5px;
        }

        .btn-login i {
            transition: transform 0.3s;
        }

        .btn-login:hover i {
            transform: translateX(5px);
        }

        /* --- FALLING LEAVES ANIMATION --- */
        .leaves-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .leaf {
            position: absolute;
            top: -50px;
            pointer-events: none;
            opacity: 0.8;
            z-index: 1;
        }

        @keyframes fall {
            0% {
                transform: translateY(-10vh) translateX(0) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Falling Sagar Super Leaves Container -->
    <div class="leaves-container" id="leavesContainer"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="glass-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>

            <div class="login-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your sales dashboard</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div
                style="background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #fecaca; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9rem; text-align: center;">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" class="form-control"
                            placeholder="Enter your ID" autocomplete="off" required>
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Enter your password" required>
                        <i class="fa-solid fa-lock" id="lock-icon"></i>
                        <i class="fa-solid fa-eye" id="togglePassword"
                            style="position: absolute; right: 15px; left: auto; cursor: pointer; color: var(--text-muted);"></i>
                    </div>
                </div>

                <script>
                    const togglePassword = document.querySelector('#togglePassword');
                    const password = document.querySelector('#password');
                    const lockIcon = document.querySelector('#lock-icon');

                    togglePassword.addEventListener('click', function (e) {
                        // toggle the type attribute
                        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                        password.setAttribute('type', type);
                        // toggle the eye slash icon
                        this.classList.toggle('fa-eye-slash');
                    });
                </script>

                <div class="form-footer footer-row">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" name="remember">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                
                <div style="text-align: center; margin-top: 15px;">
                    <button type="button" onclick="openConfigModal()" style="background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); padding: 5px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; transition: all 0.3s;">
                        <i class="fa-solid fa-server" style="margin-right: 5px;"></i> Configure Server
                    </button>
                </div>

                <div class="btn-row">
                    <button type="submit" class="btn-login">
                        Sign In <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>


    <!-- Configuration Modal -->
    <div id="configModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div class="login-card" style="max-width: 400px; padding: 30px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; color: #fff;">Server Setup</h3>
                <button onclick="closeConfigModal()" style="background: transparent; border: none; color: #666; cursor: pointer; font-size: 1.2rem;">&times;</button>
            </div>
            
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">
                Enter the IP Address of the Main Server PC.
            </p>
            
            <div class="form-group" style="opacity: 1; transform: none; animation: none;">
                <label>Main Server IP</label>
                <div class="input-wrapper">
                    <input type="text" id="serverIp" class="form-control" placeholder="e.g. 192.168.1.50">
                    <i class="fa-solid fa-network-wired"></i>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="saveServerConfig()" class="btn-login" style="flex: 2; padding: 12px;">Save & Reconnect</button>
                <button onclick="fixPermissions()" class="btn-login" style="flex: 1; padding: 12px; background: linear-gradient(135deg, #10b981, #059669); font-size: 0.8rem;" title="Run this ONLY on the Main Server PC">Enable Remote</button>
            </div>
            <div id="configStatus" style="margin-top: 15px; font-size: 0.8rem; text-align: center;"></div>
        </div>
    </div>

    <script>
        function openConfigModal() {
            document.getElementById('configModal').style.display = 'flex';
            fetch('/api/config/server-ip')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('serverIp').value = data.current_ip;
                });
        }

        function closeConfigModal() {
            document.getElementById('configModal').style.display = 'none';
        }

        function saveServerConfig() {
            const ip = document.getElementById('serverIp').value;
            const status = document.getElementById('configStatus');
            status.innerHTML = '<span style="color: #6366f1;">Updating...</span>';
            
            fetch('/api/config/server-ip', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ip: ip})
            })
            .then(r => r.json())
            .then(data => {
                if(data.status === 'success'){
                    status.innerHTML = '<span style="color: #10b981;">' + data.message + '</span>';
                    setTimeout(closeConfigModal, 1500);
                } else {
                    status.innerHTML = '<span style="color: #ef4444;">Error: ' + data.message + '</span>';
                }
            });
        }

        function fixPermissions() {
             const status = document.getElementById('configStatus');
             status.innerHTML = '<span style="color: #6366f1;">Processing...</span>';
             fetch('/api/config/fix-db-permissions', { method: 'POST' })
                .then(r => r.json())
                .then(data => {
                    if(data.status === 'success'){
                        status.innerHTML = '<span style="color: #10b981;">' + data.message + '</span>';
                    } else {
                        status.innerHTML = '<span style="color: #ef4444;">' + data.message + '</span>';
                    }
                });
        }

        function createLeaf() {
            const container = document.getElementById('leavesContainer');
            if (!container) return;

            const leaf = document.createElement('i');
            leaf.classList.add('fa-brands', 'fa-canadian-Sagar-leaf', 'leaf');

            // Random properties for "rain" effect from user snippet
            const size = Math.random() * 30 + 15; // 15px to 45px
            const left = Math.random() * 100; // 0 to 100%
            const duration = Math.random() * 5 + 5; // 5s to 10s
            const delay = Math.random() * 5;

            // Random Autumn Colors from user snippet
            const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#d35400', '#c0392b'];

            leaf.style.left = left + 'vw';
            leaf.style.fontSize = size + 'px';
            leaf.style.color = colors[Math.floor(Math.random() * colors.length)];
            leaf.style.animation = `fall ${duration}s linear ${delay}s infinite`;

            container.appendChild(leaf);

            // Cleanup
            setTimeout(() => {
                leaf.remove();
            }, (duration + delay) * 1000);
        }

        // Create a new leaf every 300 milliseconds
        setInterval(createLeaf, 300);
    </script>
</body>

</html>
